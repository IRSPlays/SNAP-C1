# SNAP-C1 Base Model Configuration
# Hardware: AMD Ryzen 5 7600 (16GB RAM) + AMD RX 7600 (8GB VRAM)
# Strategy: Train on CPU (float16), Inference on GPU via LM Studio (Vulkan)

model:
  name: "Qwen/Qwen3-4B"
  revision: "main"
  trust_remote_code: true

# No quantization — bitsandbytes is CUDA-only
# Model loads in float16 on CPU (~8GB RAM)
quantization:
  load_in_4bit: false
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "float16"
  bnb_4bit_use_double_quant: false

tokenizer:
  padding_side: "right"
  add_eos_token: true
  max_length: 1024                      # Short sequences for 16GB RAM

hardware:
  device: "cpu"                         # CPU training — no CUDA/ROCm available
  gradient_checkpointing: true          # Critical — trades compute for memory
  cpu_offload: false

inference:
  max_new_tokens: 1024
  temperature: 0.7
  top_p: 0.9
  top_k: 50
  repetition_penalty: 1.05
  do_sample: true

# LM Studio local server for GPU inference (Vulkan)
lmstudio:
  base_url: "http://localhost:1234/v1"
  model: "qwen3-4b"                    # Model identifier in LM Studio
