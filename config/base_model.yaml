# SNAP-C1 Base Model Configuration
# Qwen3-1.7B loaded in 4-bit quantization for QLoRA training
# Downgraded from Qwen3-4B: bnb 4-bit + CPU offloading has meta tensor bug,
# and without offloading only 0.37GB free — not enough for training.
# Hardware: NVIDIA RTX 2050 (4GB VRAM)

model:
  name: "Qwen/Qwen3-1.7B"
  revision: "main"
  trust_remote_code: true
  # Original (doesn't fit for training):
  # original: "Qwen/Qwen3-4B"

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"           # NormalFloat4 - best for QLoRA
  bnb_4bit_compute_dtype: "float32"    # fp32 — bf16 CUBLAS fails on RTX 2050 at higher LoRA ranks
  bnb_4bit_use_double_quant: true      # Nested quantization saves ~0.3GB

tokenizer:
  padding_side: "right"
  add_eos_token: true
  max_length: 2048                      # Reduced from 4096 — 4GB can't afford longer

hardware:
  device: "auto"                        # auto device_map — 1.7B 4-bit fits entirely on GPU
  gradient_checkpointing: true          # Critical — trades compute for memory
  cpu_offload: false                    # Not needed for 1.7B
  # max_memory removed — 1.7B 4-bit is ~1.5GB, leaving ~2.5GB for training

inference:
  max_new_tokens: 1024                  # Reduced for VRAM
  temperature: 0.7
  top_p: 0.9
  top_k: 50
  repetition_penalty: 1.05
  do_sample: true
