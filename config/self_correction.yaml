# SNAP-C1 Self-Correction LoRA Configuration
# Trains review → identify errors → fix → validate loops

adapter:
  name: "self_correction"
  description: "Structured self-review and error correction capability"

lora:
  r: 8                                 # r16 OOMs backward pass on 4GB; r8 = 3.2M params, proven to fit
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules:                      # Attention-only (MLP OOMs on 4GB even at r16)
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  num_epochs: 8                        # Increased from 3 — more exposure to structured format
  batch_size: 1
  gradient_accumulation_steps: 4       # Reduced from 16 — more frequent gradient updates
  learning_rate: 3.0e-4                # Slightly higher to push format learning
  lr_scheduler: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_seq_length: 2048                 # Reduced for 4GB VRAM
  fp16: false                          # Disabled — Qwen3 bf16 internals conflict with fp16 AMP GradScaler
  bf16: false                          # RTX 2050 has no native bf16; train in fp32 (3.2M params, negligible)
  optim: "paged_adamw_8bit"
  logging_steps: 10
  save_steps: 100
  seed: 42

data:
  path: "data/self_correction/"
  format: "jsonl"
  train_split: "train.jsonl"
  eval_split: "eval.jsonl"
  # Expected format per example:
  # {
  #   "instruction": "user query",
  #   "initial_response": "first attempt (may contain errors)",
  #   "output": "<review>\nError identified: [description]\nType: [logic|factual|code|reasoning]\nSeverity: [high|medium|low]\n</review>\n<fix>\nCorrected response: ...\nChanges made: ...\n</fix>\n<validate>\nVerification: [pass|fail]\nConfidence: [0.0-1.0]\nRemaining issues: [none|list]\n</validate>"
  # }

correction_types:
  - name: "code_bugs"
    description: "Syntax errors, logic bugs, off-by-one, null refs"
    weight: 0.3
  - name: "reasoning_errors"
    description: "Logical fallacies, wrong conclusions, missing steps"
    weight: 0.25
  - name: "factual_errors"
    description: "Wrong facts, outdated info, hallucinations"
    weight: 0.25
  - name: "completeness"
    description: "Missing edge cases, incomplete solutions"
    weight: 0.2
